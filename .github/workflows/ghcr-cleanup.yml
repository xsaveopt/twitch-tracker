name: GHCR cleanup

# Retention policy:
#   - Delete untagged image versions older than 2 days.
#   - Keep every tagged version (latest, dev, dev-<sha>, semver, etc.).
#
# Untagged versions accrue every time a rolling tag (:dev, :latest) moves and
# orphans the previous digest. Pruning them keeps the package list tidy and
# reclaims storage without ever touching something you can pull by name.

on:
  schedule:
    - cron: "0 4 * * *" # daily, 04:00 UTC
  workflow_dispatch:

permissions:
  packages: write

jobs:
  prune-untagged:
    runs-on: ubuntu-latest
    steps:
      - uses: snok/container-retention-policy@v3
        with:
          account: ${{ github.repository_owner }}
          token: ${{ secrets.GITHUB_TOKEN }}
          image-names: twitch-tracker
          image-tags: "!*" # match only untagged versions
          cut-off: 2d
          dry-run: false
