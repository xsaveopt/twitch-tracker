name: GHCR cleanup

# Retention policy:
#   - Delete every untagged image version.
#   - Keep every tagged version (latest, dev, dev-<sha>, semver, etc.).
#
# Untagged versions accrue every time a rolling tag (:dev, :latest) moves and
# orphans the previous digest. Pruning them keeps the package list tidy and
# reclaims storage without ever touching something you can pull by name.
#
# NOTE: this action has no age-based cutoff — untagged versions get removed
# as soon as this workflow runs. If you want a grace window, run the workflow
# less often instead of trying to add one (it's not a supported parameter).

on:
  schedule:
    - cron: "0 4 * * *" # daily, 04:00 UTC
  workflow_dispatch:

permissions:
  packages: write
  contents: read

jobs:
  prune-untagged:
    runs-on: ubuntu-latest
    steps:
      # Pinned by commit SHA (not tag) per GitHub's third-party-action hardening
      # guidance. Update the SHA + comment together when bumping.
      - uses: actions/delete-package-versions@e5bc658cc4c965c472efe991f8beea3981499c55 # v5.0.0
        with:
          package-name: ${{ github.event.repository.name }}
          package-type: container
          delete-only-untagged-versions: "true"
          min-versions-to-keep: "0"
